# Plugin ABI history — single source of truth for the host ABI / plugin API
# version log.
#
# The last entry's `abi` value MUST equal orc::kStagePluginHostAbiVersion in
# orc/sdk/include/orc/abi/orc_plugin_abi.h, and its `api` value MUST equal
# orc::kStagePluginApiVersion. The AbiHistorySync CTest (label "sdk") fails
# when the header constants have no matching entry here, and the
# AbiVersionDocsSync CTest fails when the generated "Version history" table in
# docs/technical/plugin-sdk.md is stale relative to this file.
#
# Regenerate the docs table after any edit:
#   tools/gen_abi_history_docs.sh . (splice output between the GENERATED ABI
#   VERSION HISTORY markers in docs/technical/plugin-sdk.md)
#
# Fields per entry:
#   abi      — host_abi_version value (integer).
#   api      — plugin_api_version value at that ABI ("" for the pre-API v1
#              release).
#   cause    — category of the change, one of:
#                descriptor-append   (new appended StagePluginDescriptor field)
#                entrypoint-signature(entrypoint parameter/return change)
#                data-contract-swap  (a boundary type is replaced wholesale)
#                contract-vtable     (a contract interface vtable layout change)
#                contract-removal    (a public SDK contract header/class removed)
#   contracts — SDK contract headers whose layout the change touches (paths as
#               in orc/sdk/sdk_headers.yaml; [] when none).
#   summary  — one-line prose used as the docs table "Change" cell.
schema: 1
history:
  - abi: 1
    api: ""
    cause: descriptor-append
    contracts: []
    summary: >-
      Initial internal release; `plugin_api_version` not yet in descriptor
  - abi: 2
    api: 1
    cause: descriptor-append
    contracts:
      - orc/abi/orc_plugin_abi.h
    summary: >-
      `plugin_api_version` added to `StagePluginDescriptor`; public SDK headers
      published
  - abi: 3
    api: 1
    cause: entrypoint-signature
    contracts:
      - orc/abi/orc_plugin_abi.h
      - orc/abi/orc_plugin_services.h
    summary: >-
      `OrcPluginServices` table added; `orc_register_stage_plugin` now receives
      `const OrcPluginServices*` as its first parameter; plugins must use the
      services table for logging instead of resolving host symbols directly
  - abi: 4
    api: 2
    cause: data-contract-swap
    contracts:
      - orc/stage/video_frame_representation.h
      - orc/stage/dropout/dropout_run.h
      - orc/stage/frame_id.h
    summary: >-
      Decode-Orc 2.0: `VideoFrameRepresentation` replaces
      `VideoFieldRepresentation` as the primary frame-data contract;
      `DAGStage::execute()` operates on frame-based artifacts; `DropoutRun`
      replaces `DropoutRegion`; `FieldID`/`FieldIDRange` removed — use
      `FrameID`/`FrameIDRange`. All plugins must be rebuilt against the v2.0 SDK
  - abi: 5
    api: 2
    cause: descriptor-append
    contracts:
      - orc/abi/orc_plugin_abi.h
      - orc/abi/orc_plugin_registration.h
    summary: >-
      `StagePluginDescriptor` gains the appended `toolchain_tag` field
      (populate with `ORC_SDK_TOOLCHAIN_TAG`); the loader requires the plugin's
      tag to equal the host's exactly. Registration helpers
      (`ORC_STAGE_PLUGIN_DESCRIPTOR`, `ORC_DEFINE_STAGE_PLUGIN`) added in
      `<orc/abi/orc_plugin_registration.h>`
  - abi: 6
    api: 2
    cause: contract-vtable
    contracts:
      - orc/stage/video_frame_representation.h
    summary: >-
      Multi-track audio: `VideoFrameRepresentation`'s single-track audio
      accessors (`audio_locked()`, `get_audio_sample_count(FrameID)`,
      `get_audio_samples(FrameID)`) are replaced by a track-indexed API —
      `audio_track_count()`, `get_audio_track_descriptor(track)`, per-track
      frame-locked accessors, and per-track free-running stream accessors
      (`get_audio_stream_pair_count` / `get_audio_stream_samples`). New contract
      header `<orc/stage/audio_track.h>`. The vtable layout change requires all
      plugins to be rebuilt
  - abi: 7
    api: 2
    cause: contract-vtable
    contracts:
      - orc/stage/video_frame_representation.h
      - orc/stage/audio/audio_channel_pair.h
    summary: >-
      Channel-pair audio (SMPTE 272M-1994): the track-indexed audio API is
      replaced by the channel-pair API — `audio_channel_pair_count()`,
      `get_audio_channel_pair_descriptor(pair)`, and `get_audio_samples(pair,
      id)` returning 24-bit-in-int32 samples. All audio is 48 kHz frame-locked
      (synchronous); the free-running stream accessors are removed. Contract
      header `<orc/stage/audio_track.h>` is replaced by
      `<orc/stage/audio/audio_channel_pair.h>`. The vtable layout change
      requires all plugins to be rebuilt
  - abi: 8
    api: 2
    cause: contract-vtable
    contracts:
      - orc/stage/video_frame_representation.h
    summary: >-
      `VideoFrameRepresentation` gains `prime_audio_decode()`: a hook that
      forces a deferred whole-stream audio decode (e.g. EFM audio) to run up
      front with progress reporting, forwarded down the wrapper chain so sinks
      can meter it on the progress dialog. The appended virtual changes the
      vtable layout, requiring all plugins to be rebuilt
  - abi: 9
    api: 2
    cause: descriptor-append
    contracts:
      - orc/abi/orc_plugin_services.h
    summary: >-
      `OrcPluginServices` gains the appended `observation_service` pointer
      (`IObservationService`, new contract header
      `<orc/stage/observation/observation_service_interface.h>`): a host-owned
      service that runs the standard observers by stable string id, reached via
      `plugin::get_observation_service()`. Guarded by `services_size`; older
      hosts leave it null. Appended field only — plugins need not be rebuilt to
      keep working against ABI 8 behaviour
  - abi: 10
    api: 2
    cause: contract-removal
    contracts:
      - orc/stage/observation/observer.h
    summary: >-
      The concrete observer classes (the nine
      `<orc/stage/observation/*_observer.h>` headers — `BiphaseObserver`,
      `WhiteSNRObserver`, …) and the `Observer` base
      (`<orc/stage/observation/observer.h>`) are removed from the plugin SDK:
      observers are now host-internal and reached exclusively through the
      `IObservationService` added in ABI 9, selected by stable string id.
      `orc-sdk-support` no longer ships observer object code, and the deprecated
      pre-tier observation include-path shims (`<orc/stage/observers/...>` and
      the flat `<orc/stage/observation_*.h>` paths) are removed.
      `observation_schema.h`, `observation_context*.h`, and
      `observation_service_interface.h` remain the contract. Source-breaking for
      any plugin still including the observer classes — migrate to
      `IObservationService::create_observer(id)`
