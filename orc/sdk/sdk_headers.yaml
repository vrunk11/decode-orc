# SDK header manifest — single source of truth for the tiered stage-plugin SDK
# surface (orc/sdk/include).
#
# Tiers:
#   abi        — frozen binary contract: descriptor, entrypoints, registration,
#                service tables. Any change bumps the host ABI version.
#   plugin-api — plugin-facing stage API / host-services surface that has not
#                yet been relocated under a tier subdirectory (orc/plugin/).
#                Treated as ABI: layout changes bump the host ABI.
#   stage      — stage contract types crossing the plugin boundary, grouped by
#                domain (preview/observation/dropout/audio/params) with the
#                foundation types at the tier root. Layout changes bump the ABI.
#   support    — compiled-into-plugin utilities. NOT part of the binary ABI;
#                changes never force a bump (recompile at the author's leisure).
#
# Deprecated entries are pre-tier include-path shims retained for one release.
#
# Consumers (kept in sync by the SdkHeaderManifestSync CTest, label "sdk"):
#   - cmake/sdk_header_allowlist.txt   (tools/gen_sdk_header_allowlist.sh)
#   - docs/technical/plugin-sdk.md     header tables
#
# Adding or removing an SDK header is a single edit here; the drift CTest fails
# until this manifest matches the on-disk header set.
