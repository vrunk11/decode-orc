name: Build and Test (Nix)

on:
  workflow_call:

jobs:
  unit-gate:
    name: Unit + Architecture Gates
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      # All work runs inside a single nix develop shell to avoid paying the
      # per-step flake evaluation overhead (was 4 separate nix develop calls).
      # The .#ci shell keeps CI tooling streamlined.
      - name: Build, Test and Validate
        run: |
          nix develop .#ci -c bash -lc "
            set -euo pipefail

            BUILD_JOBS=\"\$(nproc)\"
            if [ -z \"\$BUILD_JOBS\" ] || [ \"\$BUILD_JOBS\" -lt 2 ]; then
              BUILD_JOBS=2
            fi

            # --- Configure ---
            # GUI tests are built only in this job; link pool caps simultaneous
            # linker processes to avoid OOM on the 2-vCPU/7-GB GitHub runner.
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DBUILD_UNIT_TESTS=ON \
              -DBUILD_GUI_TESTS=ON \
              -DBUILD_INTEGRATION_TESTS=OFF \
              -DCMAKE_JOB_POOLS='link=2' \
              -DCMAKE_JOB_POOL_LINK=link

            # --- Build ---
            cmake --build build --parallel \"\$BUILD_JOBS\"

            # --- Assert fine-grained CTest labels are present ---
            labels_output=\"\$(ctest --test-dir build --print-labels)\"
            expected_labels=(unit gui sources transforms sinks contracts preview gui-logic gui-model gui-widget mvp sdk)
            missing=()
            for label in \"\${expected_labels[@]}\"; do
              if ! printf '%s\n' \"\$labels_output\" | grep -Eq \"^[[:space:]]+\$label\$\"; then
                missing+=(\"\$label\")
              fi
            done
            if [ \"\${#missing[@]}\" -ne 0 ]; then
              echo \"Missing expected CTest labels: \${missing[*]}\"
              echo \"Full ctest --print-labels output:\"
              printf '%s\n' \"\$labels_output\"
              exit 1
            fi
            echo 'All expected fine-grained labels are present'

            # --- Run unit tests ---
            QT_QPA_PLATFORM=offscreen ctest --test-dir build -L unit --parallel \"\$BUILD_JOBS\" --output-on-failure --output-junit \${PWD}/build/ctest-results-unit.xml

            # --- Architecture and SDK hard gates ---
            ctest --test-dir build -L mvp --parallel \"\$BUILD_JOBS\" --output-on-failure --output-junit \${PWD}/build/ctest-results-mvp.xml
            ctest --test-dir build -L sdk -R 'PluginPrivate' --parallel \"\$BUILD_JOBS\" --output-on-failure --output-junit \${PWD}/build/ctest-results-sdk.xml

            # --- CTest timing summary ---
            python3 cmake/summarize_ctest_junit.py --input build/ctest-results-unit.xml --output build/ctest-results-unit-summary.md --top 25

            # --- Enforce performance budget ---
            python3 cmake/check_ctest_budget.py \
              --input build/ctest-results-unit.xml \
              --max-wall-seconds 30.0 \
              --min-pass-rate 99.5 \
              --max-p95-seconds 0.085
          "

      - name: Upload Unit Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-artifacts-unit
          if-no-files-found: warn
          path: |
            build/ctest-results-unit.xml
            build/ctest-results-mvp.xml
            build/ctest-results-sdk.xml
            build/ctest-results-unit-summary.md
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/CTestCostData.txt
