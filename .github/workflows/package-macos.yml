name: Package MacOS DMG

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Name of the uploaded DMG artifact
        required: false
        default: decode-orc-macos-dmg
        type: string
      retention_days:
        description: Artifact retention in days
        required: false
        default: 30
        type: number

jobs:
  package:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fetch QtNodes source
        shell: bash
        run: |
          # Pin to the same commit as the qtnodes input in flake.nix
          git clone --depth 1 https://github.com/paceholder/nodeeditor external/qtnodes
          git -C external/qtnodes fetch --depth 1 origin 1b173f885b52e4fd9616f663ea288435ccf1d0d8
          git -C external/qtnodes checkout 1b173f885b52e4fd9616f663ea288435ccf1d0d8

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="git-${GITHUB_SHA:0:7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        shell: bash
        run: |
          brew update
          DEPS=(cmake ninja pkg-config qt@6 spdlog yaml-cpp sqlite libpng fftw ffmpeg libsoxr dylibbundler)
          MISSING=()

          for dep in "${DEPS[@]}"; do
            if ! brew list --versions "$dep" >/dev/null 2>&1; then
              MISSING+=("$dep")
            fi
          done

          if [[ "${#MISSING[@]}" -gt 0 ]]; then
            brew install "${MISSING[@]}"
          else
            echo "All Homebrew dependencies already installed"
          fi

          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Fetch ezpwd-reed-solomon headers
        shell: bash
        run: |
          git clone --depth 1 https://github.com/pjkundert/ezpwd-reed-solomon \
            -b master external/ezpwd-reed-solomon
          # Pin to the same commit used by flake.nix
          git -C external/ezpwd-reed-solomon fetch --depth 1 origin 62a490c13f6e057fbf2dc6777fde234c7a19098e
          git -C external/ezpwd-reed-solomon checkout 62a490c13f6e057fbf2dc6777fde234c7a19098e

      - name: Configure and build decode-orc
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_UNIT_TESTS=OFF \
            -DBUILD_GUI_TESTS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_DOCS=OFF \
            -DBUILD_ENCODE_ORC=OFF \
            -DEZPWD_INCLUDE_DIR="$PWD/external/ezpwd-reed-solomon/c++" \
            -DPROJECT_VERSION_OVERRIDE=${{ steps.version.outputs.version }}
          cmake --build build -j

      - name: Install to staging root
        shell: bash
        run: |
          rm -rf package-root
          cmake --install build --prefix "$PWD/package-root" --component Runtime

      - name: Bundle runtime dependencies into staged app
        shell: bash
        run: |
          APP_BUNDLE="$PWD/package-root/orc-gui.app"
          FRAMEWORKS_DIR="$APP_BUNDLE/Contents/Frameworks"

          # Ensure the staged core runtime is discoverable as liborc-core.dylib.
          CORE_DYLIB="$FRAMEWORKS_DIR/liborc-core.dylib"
          if [[ ! -e "$CORE_DYLIB" ]]; then
            CORE_CANDIDATES=()
            while IFS= read -r candidate; do
              [[ -z "$candidate" ]] && continue
              CORE_CANDIDATES+=("$candidate")
            done < <(find "$FRAMEWORKS_DIR" -maxdepth 1 -type f -name "liborc-core*.dylib" | sort)

            if [[ "${#CORE_CANDIDATES[@]}" -eq 1 ]]; then
              ln -s "$(basename "${CORE_CANDIDATES[0]}")" "$CORE_DYLIB"
            fi
          fi

          if [[ ! -e "$CORE_DYLIB" ]]; then
            echo "Missing staged core library: $CORE_DYLIB" >&2
            echo "Available staged frameworks:" >&2
            find "$FRAMEWORKS_DIR" -maxdepth 1 -type f -name "*.dylib" -print | sort >&2 || true
            exit 1
          fi

          # macdeployqt otool-scans every file under Contents/PlugIns and logs a
          # noisy "ERROR: Could not parse otool output ... is not an object file"
          # line for each plugin instructions .md file. Stash them during the
          # scan and restore them afterwards — they must sit next to the plugin
          # dylibs in the final bundle for the runtime stage-help system.
          PLUGIN_DIR="$APP_BUNDLE/Contents/PlugIns/orc-stage-plugins"
          MD_STASH="$(mktemp -d)"
          if [[ -d "$PLUGIN_DIR" ]]; then
            find "$PLUGIN_DIR" -maxdepth 1 -type f -name "*.md" -exec mv {} "$MD_STASH/" \;
          fi

          macdeployqt "$APP_BUNDLE" -always-overwrite -executable="$APP_BUNDLE/Contents/MacOS/orc-cli"

          if compgen -G "$MD_STASH/*.md" > /dev/null; then
            mv "$MD_STASH"/*.md "$PLUGIN_DIR/"
          fi
          rmdir "$MD_STASH" 2>/dev/null || true

          # Build Qt framework search paths so dylibbundler can resolve @rpath/Qt*.framework refs.
          # dylibbundler cannot recurse into .framework bundles; we point it at each Versions/A dir.
          QT_FW_SEARCH_ARGS=()
          QT_FW_IGNORE_ARGS=()
          QT_FW_DIR="$(brew --prefix qt@6)/lib"
          while IFS= read -r fw_dir; do
            fw_name="$(basename "$fw_dir" .framework)"
            fw_ver_dir="$fw_dir/Versions/A"
            if [[ -d "$fw_ver_dir" ]]; then
              QT_FW_SEARCH_ARGS+=(-s "$fw_ver_dir")
            fi
            # Also ignore Qt frameworks already deployed by macdeployqt so dylibbundler
            # won't try to re-copy them and won't fail on missing optional modules.
            QT_FW_IGNORE_ARGS+=(-i "$fw_name")
          done < <(find "$QT_FW_DIR" -maxdepth 1 -name "Qt*.framework" -type d | sort)

          # Ignore all staged stage-plugin dylibs by basename. Plugins are loaded at
          # runtime from PlugIns/orc-stage-plugins and should not be bundled as direct
          # Frameworks dependencies by dylibbundler.
          PLUGIN_DIR="$APP_BUNDLE/Contents/PlugIns/orc-stage-plugins"
          PLUGIN_IGNORE_ARGS=()
          if [[ -d "$PLUGIN_DIR" ]]; then
            while IFS= read -r plugin_path; do
              [[ -z "$plugin_path" ]] && continue
              plugin_base="$(basename "$plugin_path")"
              plugin_name="${plugin_base%.dylib}"
              # dylibbundler matching is inconsistent across releases: include both
              # the basename with and without extension.
              PLUGIN_IGNORE_ARGS+=(-i "$plugin_base")
              PLUGIN_IGNORE_ARGS+=(-i "$plugin_name")
            done < <(find "$PLUGIN_DIR" -maxdepth 1 -type f -name "liborc-stage-plugin-*.dylib" | sort)
          fi

          dylibbundler -b \
            -of \
            -ns \
            -x "$APP_BUNDLE/Contents/MacOS/orc-gui" \
            -x "$APP_BUNDLE/Contents/MacOS/orc-cli" \
            -d "$FRAMEWORKS_DIR" \
            -s "$FRAMEWORKS_DIR" \
            -s "$PLUGIN_DIR" \
            -s "$(brew --prefix)/lib" \
            -s "/opt/homebrew/lib" \
            -s "/usr/local/lib" \
            "${QT_FW_SEARCH_ARGS[@]}" \
            "${QT_FW_IGNORE_ARGS[@]}" \
            "${PLUGIN_IGNORE_ARGS[@]}" \
            -p "@executable_path/../Frameworks"

          # Some host libraries link stage plugins via @rpath. After dylibbundler
          # completes, mirror each plugin into Frameworks as a symlink so runtime
          # resolution stays deterministic without triggering dylibbundler copy loops.
          if [[ -d "$PLUGIN_DIR" ]]; then
            while IFS= read -r plugin_path; do
              [[ -z "$plugin_path" ]] && continue
              plugin_base="$(basename "$plugin_path")"
              if [[ ! -e "$FRAMEWORKS_DIR/$plugin_base" ]]; then
                ln -s "../PlugIns/orc-stage-plugins/$plugin_base" "$FRAMEWORKS_DIR/$plugin_base"
              fi
            done < <(find "$PLUGIN_DIR" -maxdepth 1 -type f -name "liborc-stage-plugin-*.dylib" | sort)
          fi

      - name: Re-sign staged app bundle
        shell: bash
        run: |
          APP_BUNDLE="$PWD/package-root/orc-gui.app"
          codesign --force --deep --sign - --timestamp=none "$APP_BUNDLE"
          codesign --verify --deep --strict "$APP_BUNDLE"

      - name: Verify standalone app bundle
        shell: bash
        run: |
          APP_BUNDLE="$PWD/package-root/orc-gui.app"
          if [[ ! -d "$APP_BUNDLE" ]]; then
            echo "App bundle not found in staging root" >&2
            exit 1
          fi

          CHECK_TARGETS=()
          while IFS= read -r target; do
            [[ -z "$target" ]] && continue
            CHECK_TARGETS+=("$target")
          done < <(
            {
              echo "$APP_BUNDLE/Contents/MacOS/orc-gui"
              echo "$APP_BUNDLE/Contents/MacOS/orc-cli"
              find "$APP_BUNDLE/Contents/Frameworks" -type f -name "*.dylib" 2>/dev/null || true
            }
          )

          FAIL=0
          for target in "${CHECK_TARGETS[@]}"; do
            [[ -f "$target" ]] || continue
            target_basename="$(basename "$target")"
            while IFS= read -r dep; do
              [[ -z "$dep" ]] && continue
              dep_basename="$(basename "$dep")"
              if [[ "$dep_basename" == "$target_basename" ]]; then
                continue
              fi
              case "$dep" in
                /System/*|/usr/lib/*|@rpath/*|@loader_path/*|@executable_path/*)
                  ;;
                /opt/homebrew/*|/usr/local/*|/nix/store/*)
                  echo "External dependency found in $target: $dep" >&2
                  FAIL=1
                  ;;
                *)
                  echo "Unexpected absolute dependency in $target: $dep" >&2
                  FAIL=1
                  ;;
              esac
            done < <(otool -L "$target" | tail -n +2 | awk '{print $1}')
          done

          if [[ "$FAIL" -ne 0 ]]; then
            echo "Standalone verification failed" >&2
            exit 1
          fi

      - name: Create DMG from staged app
        shell: bash
        run: |
          APP_BUNDLE="$PWD/package-root/orc-gui.app"
          if [[ ! -d "$APP_BUNDLE" ]]; then
            echo "Staged app bundle missing: $APP_BUNDLE" >&2
            exit 1
          fi

          # macos-latest runners are Apple Silicon; name the artifact accordingly
          # so Intel users don't download a binary that won't run.
          DMG_NAME="Decode-Orc-${{ steps.version.outputs.version }}-macos-arm64.dmg"
          DMG_PATH="dist/$DMG_NAME"
          VOL_NAME="Decode Orc ${{ steps.version.outputs.version }}"
          MAX_ATTEMPTS=5
          rm -rf dmg-root
          mkdir -p dmg-root dist
          cp -R "$APP_BUNDLE" dmg-root/
          ln -s /Applications dmg-root/Applications

          detach_stale_volumes() {
            # Best-effort cleanup in case a previous attempt left a mounted image.
            local suffix
            for suffix in "" " 1" " 2" " 3"; do
              hdiutil detach "/Volumes/$VOL_NAME$suffix" -force >/dev/null 2>&1 || true
            done
          }

          attempt=1
          while [[ "$attempt" -le "$MAX_ATTEMPTS" ]]; do
            detach_stale_volumes
            rm -f "$DMG_PATH"

            echo "Creating DMG (attempt $attempt/$MAX_ATTEMPTS)..."
            if create_output=$(hdiutil create \
              -volname "$VOL_NAME" \
              -srcfolder dmg-root \
              -ov \
              -format UDZO \
              "$DMG_PATH" 2>&1); then
              echo "$create_output"
              hdiutil verify "$DMG_PATH"
              break
            fi

            echo "$create_output" >&2
            if ! grep -qi "resource busy" <<<"$create_output"; then
              echo "hdiutil create failed with a non-retryable error" >&2
              exit 1
            fi

            if [[ "$attempt" -eq "$MAX_ATTEMPTS" ]]; then
              echo "hdiutil create failed after $MAX_ATTEMPTS attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Transient hdiutil contention detected; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Collect DMG artifact
        shell: bash
        run: |
          mkdir -p dist
          DMG_FILES=()
          while IFS= read -r dmg; do
            [[ -z "$dmg" ]] && continue
            DMG_FILES+=("$dmg")
          done < <(find dist -type f \( -name "*.dmg" -o -name "*.DMG" \))

          if [[ "${#DMG_FILES[@]}" -eq 0 ]]; then
            echo "No DMG files were generated" >&2
            echo "Searched from: $PWD" >&2
            find dist -maxdepth 3 -type f | sed -n '1,200p' >&2 || true
            exit 1
          fi
          ls -lh dist/*.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
